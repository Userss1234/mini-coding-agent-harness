name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall -q main.py harness tests

      - name: Run unit tests
        run: python -m pytest

      - name: Run scripted benchmark
        run: |
          python main.py eval --mode scripted --output artifacts/EVAL.md --json-output artifacts/EVAL.json --trace-dir artifacts/eval_runs

      - name: Render trace HTML sample
        run: |
          python main.py trace-report --input artifacts/eval_runs/syntax_check.jsonl --output artifacts/TRACE.html

      - name: Run MCP smoke
        run: |
          python main.py --workspace . --trace artifacts/mcp_smoke_trace.jsonl mcp-smoke --output artifacts/MCP_SMOKE.md

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: artifacts/
